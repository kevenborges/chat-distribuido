<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>FURG | Sistema de Chat Distribuído</title>
    <style>
        :root { --bg-color: #121212; --panel-bg: #1e1e1e; --text-main: #e0e0e0; --text-muted: #a0a0a0; --accent: #bb86fc; --accent-hover: #985eff; --success: #03dac6; --error: #cf6679; }
        body { font-family: 'Consolas', 'Courier New', monospace; background-color: var(--bg-color); color: var(--text-main); margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .app-container { background-color: var(--panel-bg); width: 90%; max-width: 800px; height: 80vh; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #333; }
        header { background-color: #252526; padding: 15px 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        header h2 { margin: 0; font-size: 1.2rem; color: var(--accent); }
        .status { font-size: 0.9rem; color: var(--text-muted); display: flex; align-items: center; gap: 8px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background-color: var(--error); }
        .status-dot.online { background-color: var(--success); box-shadow: 0 0 8px var(--success); }
        #login-section { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        #login-section p { font-weight: bold; letter-spacing: 1px; }
        #login-section input { background: #2d2d2d; border: 1px solid #444; color: white; padding: 12px; font-size: 1rem; border-radius: 4px; margin-bottom: 15px; width: 100%; max-width: 300px; text-align: center; outline: none; }
        #login-section input:focus { border-color: var(--accent); }
        
        #chat-section { 
            display: none; 
            flex-direction: column; 
            flex: 1; 
            min-height: 0;
        }

        #chat-box { 
            flex: 1; 
            padding: 20px; 
            overflow-x: hidden; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            min-height: 0;
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--panel-bg); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        
        .msg-row { display: flex; width: 100%; margin-bottom: 5px; }
        .msg-row.me { justify-content: flex-end; }
        .msg-row.other { justify-content: flex-start; }
        .msg-row.system { justify-content: center; }
        
        .msg { padding: 8px 14px; max-width: 75%; word-wrap: break-word; font-family: 'Segoe UI', Tahoma, sans-serif; position: relative; }
        .msg.me { background-color: #3b2a5c; border-radius: 12px 12px 0px 12px; border-bottom: 2px solid var(--accent-hover); color: white; }
        .msg.other { background-color: #2d2d2d; border-radius: 12px 12px 12px 0px; border-left: 4px solid; color: white; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .msg.system { background-color: transparent; color: var(--text-muted); font-style: italic; font-size: 0.85em; }
        
        .msg-user { font-size: 0.8em; font-weight: bold; margin-bottom: 4px; }
        .msg-text { line-height: 1.3; }
        .msg-time { font-size: 0.7em; opacity: 0.6; text-align: right; margin-top: 4px; }
        
        .input-area { padding: 15px 20px; background-color: #252526; border-top: 1px solid #333; display: flex; gap: 10px; }
        .input-area input { flex: 1; background: #3c3c3c; border: 1px solid #555; color: white; padding: 12px; border-radius: 4px; outline: none; font-family: 'Segoe UI', sans-serif; }
        .input-area input:focus { border-color: var(--accent); }
        button { background-color: var(--accent); color: #000; font-weight: bold; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; transition: 0.2s; font-family: 'Consolas', monospace; }
        button:hover { background-color: var(--accent-hover); }
    </style>
</head>
<body>
<div class="app-container">
    <header>
        <h2>>_ CHAT_DISTRIBUIDO</h2>
        <div class="status">
            <span class="status-dot" id="status-indicator"></span>
            <span id="status-text">OFFLINE</span>
        </div>
    </header>
    <div id="login-section">
        <p>IDENTIFICAÇÃO DO NÓ CLIENTE</p>
        <input type="text" id="apelido" placeholder="Insira seu apelido..." autocomplete="off">
        <button onclick="conectar()">INICIAR SESSÃO</button>
    </div>
    <div id="chat-section">
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="mensagem" placeholder="Digite /clear para limpar a tela..." autocomplete="off">
            <button onclick="enviar()">ENVIAR</button>
        </div>
    </div>
</div>
<audio id="som-notificacao" src="https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3" preload="auto"></audio>
<script>
    let intervalBusca;

    // Função que gera uma cor Hexadecimal baseada nas letras do nome do usuário
    function stringToColor(str) {
        let hash = 0;
        // Cria um número inteiro gigante a partir das letras do nome
        for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
        let color = '#';
        // Converte o número para formato de cor RGB (#FFFFFF)
        for (let i = 0; i < 3; i++) {
            let value = (hash >> (i * 8)) & 0xFF;
            value = Math.max(value, 100); // Força um brilho mínimo para o texto não ficar preto invisível
            color += ('00' + value.toString(16)).substr(-2);
        }
        return color;
    }

    async function conectar() {
        // Pega o valor do input e verifica se está vazio
        const apelido = document.getElementById('apelido').value;
        if(!apelido) return alert("Erro: Apelido nulo!");
        
        try {
            // Faz uma requisição POST (assíncrona) para o Flask informando o apelido
            const resposta = await fetch('/conectar', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({apelido: apelido})
            });
            const dados = await resposta.json();
            
            // Se a conexão de Socket lá no Backend funcionou
            if(dados.status === 'sucesso') {
                // Esconde a tela de login e mostra o Chat
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'flex';
                // Altera o sinal de status do cabeçalho
                document.getElementById('status-indicator').classList.add('online');
                document.getElementById('status-text').innerText = "ONLINE";
                
                // Inicia o Polling: Executa a função buscarMensagens() a cada 1000ms (1 segundo)
                intervalBusca = setInterval(buscarMensagens, 1000); 
            } else { 
                alert("Falha: " + dados.mensagem); 
            }
        } catch (err) {
            alert("Erro de conexão. Verifique se o servidor está online.");
        }
    }

    async function enviar() {
        const input = document.getElementById('mensagem');
        const texto = input.value;
        if(!texto) return; // Não deixa enviar caixa vazia
        
        // Envia o texto via POST para a rota /enviar do Flask
        await fetch('/enviar', { 
            method: 'POST', 
            headers: {'Content-Type': 'application/json'}, 
            body: JSON.stringify({texto: texto}) 
        });
        
        input.value = ''; // Limpa a caixa de texto
        buscarMensagens(); // Força uma atualização imediata na tela
    }

    async function buscarMensagens() {
        // Consulta o Flask pedindo a lista completa de mensagens guardadas na sessão
        const resposta = await fetch('/mensagens');
        const dados = await resposta.json();
        const box = document.getElementById('chat-box');
        const meuApelido = document.getElementById('apelido').value;
        
        // Só redesenha o chat se o número de mensagens mudar (para não piscar a tela à toa)
        if (box.childElementCount !== dados.mensagens.length) {
            
            // Verificação de Som de Notificação
            if(dados.mensagens.length > 0) {
                let ultima_msg = dados.mensagens[dados.mensagens.length - 1];
                // Toca som SE não for aviso do sistema E não for mensagem escrita por mim
                if (!ultima_msg.includes("[SISTEMA]") && !ultima_msg.includes(`[${meuApelido}]:`) && box.childElementCount > 0) {
                     document.getElementById('som-notificacao').play().catch(e => {});
                }
            }
            
            box.innerHTML = ''; // Limpa a div principal
            
            // Loop para desenhar as caixas de mensagem
            dados.mensagens.forEach(msg => {
                const rowDiv = document.createElement('div');
                const contentDiv = document.createElement('div');
                
                if (msg.includes("[SISTEMA]")) {
                    rowDiv.className = 'msg-row system';
                    contentDiv.className = 'msg system';
                    contentDiv.innerText = msg;
                } else {
                    // Usa expressão regular (Regex) para fatiar: "[15:30] [Keven]: Olá mundo"
                    const match = msg.match(/^\[(.*?)\] \[(.*?)\]: (.*)$/);
                    if (match) {
                        const hora = match[1];
                        const remetente = match[2];
                        const texto = match[3];
                        
                        // Checa de quem é a mensagem para alinhar Direita (eu) ou Esquerda (outro)
                        const isMe = (remetente === meuApelido);
                        rowDiv.className = isMe ? 'msg-row me' : 'msg-row other';
                        contentDiv.className = isMe ? 'msg me' : 'msg other';
                        
                        // Pinta a borda lateral com a cor do usuário
                        const corUsuario = stringToColor(remetente);
                        if (!isMe) contentDiv.style.borderLeftColor = corUsuario;
                        
                        // Monta o mini-HTML do balãozinho de mensagem
                        contentDiv.innerHTML = `
                            <div class="msg-user" style="color: ${isMe ? '#bb86fc' : corUsuario}">${remetente}</div>
                            <div class="msg-text">${texto}</div>
                            <div class="msg-time">${hora}</div>
                        `;
                    } else {
                        // Trata erros: se a mensagem vier num formato esquisito, desenha simples
                        rowDiv.className = 'msg-row other';
                        contentDiv.className = 'msg other';
                        contentDiv.innerText = msg;
                    }
                }
                
                // Insere as divs construídas na tela
                rowDiv.appendChild(contentDiv);
                box.appendChild(rowDiv);
            });
            // Rola a tela até o final (auto-scroll)
            box.scrollTop = box.scrollHeight;
        }
    }

    // Listener para o botão "Enter" do teclado acionar a função de enviar
    document.getElementById("mensagem").addEventListener("keypress", function(event) { 
        if (event.key === "Enter") enviar(); 
    });
</script>
</body>
</html>
